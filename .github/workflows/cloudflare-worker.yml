name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main

jobs:
  publish-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install wrangler@4.104.0

      - name: Sync JobMojito signing secret
        run: printf "%s" "$JOBMOJITO_SIGNING_KEY" | npx wrangler secret put JOBMOJITO_SIGNING_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          JOBMOJITO_SIGNING_KEY: ${{ secrets.JOBMOJITO_SIGNING_KEY }}

      - name: Publish Cloudflare Worker
        run: npx wrangler publish
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
